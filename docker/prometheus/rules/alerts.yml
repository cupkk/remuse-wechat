groups:
  - name: 系统告警规则
    rules:
      # 服务可用性告警
      - alert: 服务宕机
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务 {{ $labels.instance }} 已宕机"
          description: "服务 {{ $labels.job }} 实例 {{ $labels.instance }} 已经1分钟没有响应"

      # HTTP错误率告警
      - alert: HTTP高错误率
        expr: sum(rate(http_requests_total{status_code=~"5.."}[5m])) / sum(rate(http_requests_total[5m])) * 100 > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "HTTP请求错误率过高"
          description: "接口 {{ $labels.path }} 过去5分钟错误率达 {{ $value | humanize }}%"

      # 高延迟告警
      - alert: API高延迟
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, path)) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API接口响应缓慢"
          description: "接口 {{ $labels.path }} 99分位响应时间超过3秒，当前值: {{ $value | humanize }}s"

      # AI任务失败告警
      - alert: AI任务高失败率
        expr: sum(rate(ai_task_duration_seconds_count{status="failed"}[10m])) / sum(rate(ai_task_duration_seconds_count[10m])) * 100 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI任务失败率过高"
          description: "{{ $labels.task_type }} 任务过去10分钟失败率达 {{ $value | humanize }}%"

      # 服务器资源告警
      - alert: 高CPU使用率
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务器CPU使用率过高"
          description: "实例 {{ $labels.instance }} CPU使用率超过80%，当前值: {{ $value | humanize }}%"

      - alert: 高内存使用率
        expr: 100 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "服务器内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率超过85%，当前值: {{ $value | humanize }}%"

      - alert: 磁盘空间不足
        expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "服务器磁盘空间不足"
          description: "实例 {{ $labels.instance }} 根分区使用率超过90%，当前值: {{ $value | humanize }}%"

      # 业务指标告警
      - alert: 用户数突增
        expr: rate(active_users[1m]) > 100
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "活跃用户数突增"
          description: "当前活跃用户增长率超过100/分钟，可能有流量冲击"

      - alert: 上传文件过大
        expr: sum(rate(upload_file_size_bytes_sum[1h])) / sum(rate(upload_file_size_bytes_count[1h])) > 10 * 1024 * 1024
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "上传文件平均大小过大"
          description: "过去1小时平均上传文件大小超过10MB，当前值: {{ $value | humanizeBytes }}"

      - alert: 数据库慢查询过多
        expr: histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket[5m])) by (le, table)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库慢查询过多"
          description: "表 {{ $labels.table }} 95分位查询时间超过1秒，当前值: {{ $value | humanize }}s"

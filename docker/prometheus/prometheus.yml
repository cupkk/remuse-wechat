global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus自身监控
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 服务器指标
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # 应用服务指标
  - job_name: "remuse-backend"
    scrape_interval: 10s
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:3001"]
        labels:
          service: "remuse-backend"
          environment: "production"

  # 前端服务（如果有指标暴露）
  - job_name: "remuse-frontend"
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:80"]
        labels:
          service: "remuse-frontend"

  # Redis监控
  - job_name: "redis"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

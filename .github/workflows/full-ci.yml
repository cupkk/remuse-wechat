name: 全量CI/CD流程

on:
  push:
    branches: [ main, develop, 'release/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # 代码检查
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 安装Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: |
            fronted/package-lock.json
            backend/package-lock.json
            remuse-miniprogram/package-lock.json

      - name: 安装前端依赖
        working-directory: ./fronted
        run: npm ci
      
      - name: 前端ESLint检查
        working-directory: ./fronted
        run: npm run lint
      
      - name: 前端Prettier检查
        working-directory: ./fronted
        run: npm run format:check

      - name: 安装后端依赖
        working-directory: ./backend
        run: npm ci
      
      - name: 后端ESLint检查
        working-directory: ./backend
        run: npm run lint || echo "ESLint未配置，跳过"

  # 测试
  test:
    name: 自动化测试
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3
      
      - name: 安装Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: |
            fronted/package-lock.json
            backend/package-lock.json

      - name: 安装后端依赖
        working-directory: ./backend
        run: npm ci
      
      - name: 后端单元测试
        working-directory: ./backend
        run: npm run test:unit
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: 安装前端依赖
        working-directory: ./fronted
        run: npm ci
      
      - name: 前端单元测试
        working-directory: ./fronted
        run: npm run test -- --run || echo "前端测试未配置，跳过"

  # 安全扫描
  security:
    name: 安全漏洞扫描
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      
      - name: 依赖漏洞扫描
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --all-projects --severity-threshold=high
          
      - name: 敏感信息扫描
        uses: zricethezav/gitleaks-action@v1.3.0
        with:
          args: --path=. --verbose

  # 构建
  build:
    name: 项目构建
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v3
      
      - name: 安装Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: |
            fronted/package-lock.json
            backend/package-lock.json

      - name: 安装前端依赖
        working-directory: ./fronted
        run: npm ci
      
      - name: 前端构建
        working-directory: ./fronted
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}

      - name: 安装后端依赖
        working-directory: ./backend
        run: npm ci
      
      - name: 后端构建
        working-directory: ./backend
        run: npm run build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: fronted/dist/
          
      - name: 上传后端构建产物
        uses: actions/upload-artifact@v3
        with:
          name: backend-dist
          path: backend/dist/

  # 部署到测试环境
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: 下载前端构建产物
        uses: actions/download-artifact@v3
        with:
          name: frontend-dist
          path: dist/frontend
          
      - name: 下载后端构建产物
        uses: actions/download-artifact@v3
        with:
          name: backend-dist
          path: dist/backend

      - name: 部署到测试服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /var/www/remuse-staging
            # 备份当前版本
            tar -zcf backup/backup-$(date +%Y%m%d%H%M%S).tar.gz ./
            # 更新代码
            rm -rf dist/
            # 上传的文件会自动同步到服务器对应目录
            # 重启服务
            pm2 reload remuse-backend-staging
            # 健康检查
            curl -f http://localhost:3001/api/health || exit 1

  # 部署到生产环境
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 下载前端构建产物
        uses: actions/download-artifact@v3
        with:
          name: frontend-dist
          path: dist/frontend
          
      - name: 下载后端构建产物
        uses: actions/download-artifact@v3
        with:
          name: backend-dist
          path: dist/backend

      - name: 部署到生产服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /var/www/remuse-production
            # 备份当前版本
            tar -zcf backup/backup-$(date +%Y%m%d%H%M%S).tar.gz ./
            # 切换到维护模式
            touch maintenance.enable
            # 更新代码
            rm -rf dist/
            # 上传的文件会自动同步到服务器对应目录
            # 重启服务
            pm2 reload remuse-backend-production
            # 健康检查
            curl -f http://localhost:3000/api/health || exit 1
            # 关闭维护模式
            rm maintenance.enable

  # 部署完成通知
  notify:
    name: 部署完成通知
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: 发送企业微信通知
        uses: lazy-actions/wechat-workbot-action@v1
        with:
          webhook: ${{ secrets.WECHAT_WEBHOOK }}
          msgtype: markdown
          content: |
            ## 🚀 项目部署完成
            > **版本**: ${{ github.sha }}
            > **环境**: ${{ github.ref == 'refs/heads/main' ? '生产环境' : '测试环境' }}
            > **分支**: ${{ github.ref_name }}
            > **提交人**: ${{ github.actor }}
            > **状态**: ${{ needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success' ? '✅ 成功' : '❌ 失败' }}
